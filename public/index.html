<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Site de Teste</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Meu Primeiro Site</h1>
    <h2>Feito com Replit, GitHub e Render</h2>
  </header>

  <main>
    <section class="intro">
      <p>
        Este é o meu primeiro site publicado na internet. Estou fazendo este
        teste para aprender a publicar um site na internet.
      </p>
    </section>

    <section class="chat-section">
      <h3>Assistente de IA</h3>
      <div class="chat-box" id="chatBox">
        <div class="message bot">
          <span class="avatar">🤖</span>
          <div class="bubble">Olá! Sou o seu assistente de IA. Como posso ajudar você hoje?</div>
        </div>
      </div>

      <div class="chat-input-area">
        <input
          type="text"
          id="userInput"
          placeholder="Digite sua mensagem..."
          autocomplete="off"
        />
        <button id="sendBtn">Enviar</button>
      </div>
    </section>
  </main>

  <script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    const history = [];

    function addMessage(role, text) {
      const wrapper = document.createElement('div');
      wrapper.classList.add('message', role);

      const avatar = document.createElement('span');
      avatar.classList.add('avatar');
      avatar.textContent = role === 'user' ? '🧑' : '🤖';

      const bubble = document.createElement('div');
      bubble.classList.add('bubble');
      bubble.textContent = text;

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function addTypingIndicator() {
      const wrapper = document.createElement('div');
      wrapper.classList.add('message', 'bot', 'typing-indicator-wrapper');
      wrapper.id = 'typingIndicator';

      const avatar = document.createElement('span');
      avatar.classList.add('avatar');
      avatar.textContent = '🤖';

      const bubble = document.createElement('div');
      bubble.classList.add('bubble', 'typing');
      bubble.innerHTML = '<span></span><span></span><span></span>';

      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      userInput.value = '';
      sendBtn.disabled = true;
      userInput.disabled = true;

      addMessage('user', text);
      history.push({ role: 'user', content: text });

      addTypingIndicator();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history }),
        });

        const data = await response.json();
        removeTypingIndicator();

        if (data.reply) {
          addMessage('bot', data.reply);
          history.push({ role: 'assistant', content: data.reply });
        } else if (data.error) {
          addMessage('bot', '⚠️ ' + data.error);
        }
      } catch (err) {
        removeTypingIndicator();
        addMessage('bot', '⚠️ Não foi possível conectar ao servidor. Tente novamente.');
      }

      sendBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
